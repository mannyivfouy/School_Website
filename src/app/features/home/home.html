<div>
  <div class="relative left-1/2 right-1/2 w-screen -translate-x-1/2">
    <app-image-slider scrollAnimate animClass="animate-fade-in" class="block"></app-image-slider>
  </div>
  <app-welcome-message
    scrollAnimate
    animClass="animate-fade-up"
    class="block"
  ></app-welcome-message>
  <app-stats-card
    scrollAnimate
    animClass="animate-fade-up"
    class="block [animation-delay:150ms]"
    (animated)="statsCard.startCount()"
    #statsCard
  ></app-stats-card>
</div>
