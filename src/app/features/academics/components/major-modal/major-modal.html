<!-- BACKDROP -->
<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-md"
  (click)="close.emit()"
>
  <!-- MODAL -->
  <div
    class="relative w-[900px] max-w-[95%] max-h-[90vh] bg-[#F7FAF8] rounded-3xl shadow-2xl overflow-hidden flex flex-col"
    (click)="$event.stopPropagation()"
  >
    <!-- HEADER -->
    <div
      class="sticky top-0 z-20 bg-[#F7FAF8]/90 backdrop-blur-md border-b border-gray-200 px-8 py-5 flex justify-between items-center"
    >
      <h1
        class="text-lg px-4 py-1 text-xs font-semibold uppercase rounded-full bg-[#00a76d]/10 text-[#00a76d] border border-[#00a76d]/30"
      >
        {{ card.majorName }} - {{ card.degreeType }}
      </h1>

      <button
        (click)="close.emit()"
        class="p-2 rounded-xl bg-white shadow hover:bg-gray-100 transition flex items-center justify-center cursor-pointer"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M18 6 6 18"></path>
          <path d="M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <!-- CONTENT -->
    <div class="p-8 overflow-y-auto max-h-[calc(90vh-80px)]">
      <!-- DESCRIPTION -->
      <div class="mb-6 text-sm text-gray-600">
        {{ card.degreeDescription }}
      </div>

      <!-- SEMESTERS -->
      <div class="space-y-6">
        <div
          *ngFor="let group of card.subjects"
          class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden"
        >
          <div class="px-6 py-4 border-l-4 border-[#00a76d] flex items-center justify-between">
            <h2 class="font-semibold text-[#0B5D3B]">
              {{
                card.degreeType?.toLowerCase().includes('master') ||
                card.degreeType?.toLowerCase().includes('bridging')
                  ? group.semester
                  : 'Semester ' + group.semester
              }}
            </h2>

            <h2 class="font-semibold text-xl text-[#00a76d]">
              {{ group.price | currency }}
            </h2>
          </div>

          <app-semester-list [subjects]="group.subjects"></app-semester-list>
        </div>
      </div>
    </div>
  </div>
</div>
